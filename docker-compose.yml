version: "3.9"

services:
  # 1) Database
  postgres:
    image: postgres:16
    container_name: cce-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cce-net

  # 2) Kafka Messaging
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE}
      CLUSTER_ID: ${CLUSTER_ID}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - cce-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTERS_0_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS}
    networks:
      - cce-net

  # 3) IAM (Keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: keycloak
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "8081:8080"
    environment:
      KC_DB: ${KC_DB}
      KC_DB_URL_HOST: ${KC_DB_URL_HOST}
      KC_DB_URL_PORT: ${KC_DB_URL_PORT}
      KC_DB_URL_DATABASE: ${KC_DB_URL_DATABASE}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_KEYCLOAK_ADMIN: ${KC_KEYCLOAK_ADMIN}
      KC_KEYCLOAK_ADMIN_PASSWORD: ${KC_KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_PROXY: ${KC_PROXY}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED}
    command: start
    networks:
      - cce-net

  # ==================== MongoDB ====================
  mongo:
    image: mongo:7.0
    container_name: cce-mongo
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cce-net

  # ==================== OpenHIM Core ====================
  openhim-core:
    image: jembi/openhim-core:v8.5.1
    container_name: cce-openhim-core
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "5000:5000"
      - "5001:5001"
      - "8082:8080"
    environment:
      - mongo_url=mongodb://mongo/openhim
      - mongo_atnaUrl=mongodb://mongo/openhim
      - api_authenticationTypes=["local","basic"]
      - authentication_enableJWTAuthentication=false
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('https');h.get({hostname:'localhost',port:8080,path:'/heartbeat',rejectUnauthorized:false},r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - cce-net

  # ==================== OpenHIM Console ====================
  openhim-console:
    image: jembi/openhim-console:v1.18.2
    container_name: cce-openhim-console
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "9000:80"
    volumes:
      - ./openhim-console/default.json:/usr/share/nginx/html/config/default.json:ro
    depends_on:
      openhim-core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cce-net

  # ==================== Node Exporter (EC2 host metrics) ====================
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: cce-node-exporter
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - cce-net

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: cce-prometheus
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped
    networks:
      - cce-net

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: cce-grafana
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - cce-net

  # 4) API Gateway
  gateway-service:
    image: ${GATEWAY_SERVICE_IMAGE:-gateway-service:latest}
    container_name: gateway-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - postgres
    ports:
      - "8091:8090"
    environment:
      # JVM
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
      # Database (R2DBC PostgreSQL)
      DATABASE_URL: ${POSTGRES_DB_URL}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      # CORS
      ALLOWED_ORIGINS: ${GATEWAY_ALLOWED_ORIGINS}
      # Downstream services
      ADMIN_SERVICE_URI: ${ADMIN_SERVICE_URI}
      # JWT
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_ROLES_CLAIM_PATH: ${JWT_ROLES_CLAIM_PATH}
      # Routes
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_ID: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_ID:-httpbin}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI:-http://httpbin.org:80}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_PREDICATES_0: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_PREDICATES_0:-Path=/test/**}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_FILTERS_0: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_FILTERS_0:-JwtValidationFilter}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_ID: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_ID:-cce-collector-service}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI:-http://cce-collector-service:8080}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_PREDICATES_0: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_PREDICATES_0:-Path=/v1/events/**}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_FILTERS_0_NAME: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_FILTERS_0_NAME:-JwtValidationFilter}
      # Compliance service routes
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_ID: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_ID:-cce-compliance-service}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_URI: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_URI:-http://cce-compliance-service:8080}
      SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_PREDICATES_0: ${SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_PREDICATES_0:-Path=/v1/compliance/**}
      # Keycloak
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_TARGET_REALM: ${KEYCLOAK_TARGET_REALM}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Authorization
      AUTHORIZATION_ENABLED: ${AUTHORIZATION_ENABLED}
      LOAD_PERMISSIONS_FROM_DATABASE_ON_STARTUP: ${LOAD_PERMISSIONS_FROM_DATABASE_ON_STARTUP}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - cce-net
  
  openhim-cce-emmitter-adaptor:
    image: ${OPENHIM_CCE_EMMITTER_ADAPTOR_IMAGE:-openhim-cce-emmitter-adaptor:latest}
    container_name: openhim-cce-emmitter-adaptor
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "8092:8082"
    environment:
      OPENHIM_CORE_HOST: ${OPENHIM_CORE_HOST}
      OPENHIM_USERNAME: ${OPENHIM_USERNAME}
      OPENHIM_PASSWORD: ${OPENHIM_PASSWORD}
      CCE_COLLECTOR_URL: ${CCE_COLLECTOR_URL}
      CCE_COLLECTOR_AUTH_TOKEN: ${CCE_COLLECTOR_AUTH_TOKEN}
      EBUZIMA_CLIENT_ID: ${EBUZIMA_CLIENT_ID}
      SPICE_CLIENT_ID: ${SPICE_CLIENT_ID}
      KEYCLOAK_HOST: ${KEYCLOAK_HOST} 
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID} 
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Actuator / Prometheus metrics
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_METRICS_TAGS_APPLICATION: openhim-cce-emmitter-adaptor
    networks:
      - cce-net
  
  cce-collector-service:
    image: ${CCE_COLLECTOR_SERVICE_IMAGE:-cce-collector-service:latest}
    container_name: cce-collector-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - postgres
      - kafka
      - kafka-ui
    ports:
      - "8093:8080"
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_DB_URL_JDBC}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-5}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      SPRING_KAFKA_PRODUCER_ACKS: ${SPRING_KAFKA_PRODUCER_ACKS:-all}
      SPRING_KAFKA_PRODUCER_RETRIES: ${SPRING_KAFKA_PRODUCER_RETRIES:-3}
      CCE_COLLECTOR_DEDUP_LOOKBACK_DAYS: ${CCE_COLLECTOR_DEDUP_LOOKBACK_DAYS:-30}
      CCE_COLLECTOR_MAX_PAYLOAD_SIZE: ${CCE_COLLECTOR_MAX_PAYLOAD_SIZE:-1048576}
      CCE_COLLECTOR_FHIR_STRICT_VALIDATION: ${CCE_COLLECTOR_FHIR_STRICT_VALIDATION:-false}
      CCE_COLLECTOR_KAFKA_TOPICS_INBOUND: ${CCE_COLLECTOR_KAFKA_TOPICS_INBOUND:-cce.events.inbound}
      CCE_COLLECTOR_KAFKA_TOPICS_DEAD_LETTER: ${CCE_COLLECTOR_KAFKA_TOPICS_DEAD_LETTER:-cce.deadletter}
      CCE_COLLECTOR_KAFKA_PUBLISH_TIMEOUT_SECONDS: ${CCE_COLLECTOR_KAFKA_PUBLISH_TIMEOUT_SECONDS:-30}
      # Actuator / Prometheus metrics
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_METRICS_TAGS_APPLICATION: cce-collector-service
    networks:
      - cce-net

  cce-compliance-service:
    image: ${CCE_COMPLIANCE_SERVICE_IMAGE:-cce-compliance-service:latest}
    container_name: cce-compliance-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - postgres
      - kafka
    ports:
      - "8094:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      # Database
      DB_HOST: ${POSTGRES_DB_HOST:-cce-postgres}
      DB_PORT: ${POSTGRES_DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-ccedb}
      DB_USERNAME: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-30}
      DB_POOL_MIN_IDLE: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:-10}
      DB_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-30000}
      DB_IDLE_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:-600000}
      DB_MAX_LIFETIME: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:-1800000}
      # Flyway (separate migration history from collector service)
      SPRING_FLYWAY_TABLE: flyway_schema_history_compliance
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "false"
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_CONCURRENCY: ${CCE_COMPLIANCE_KAFKA_CONCURRENCY:-5}
      KAFKA_PARTITIONS: ${CCE_COMPLIANCE_KAFKA_PARTITIONS:-25}
      KAFKA_RETRY_MAX_ATTEMPTS: ${CCE_COMPLIANCE_KAFKA_RETRY_MAX_ATTEMPTS:-5}
      KAFKA_RETRY_BACKOFF_MS: ${CCE_COMPLIANCE_KAFKA_RETRY_BACKOFF_MS:-2000}
      # Observability
      TRACING_SAMPLE_RATE: ${CCE_COMPLIANCE_TRACING_SAMPLE_RATE:-0.1}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_METRICS_TAGS_APPLICATION: cce-compliance-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - cce-net

  cce-intelligence-service:
    image: ${CCE_INTELLIGENCE_SERVICE_IMAGE:-cce-intelligence-service:latest}
    container_name: cce-intelligence-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - postgres
      - kafka
    ports:
      - "8095:8085"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8085
      # Database
      DB_HOST: ${POSTGRES_DB_HOST:-cce-postgres}
      DB_PORT: ${POSTGRES_DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-ccedb}
      DB_USERNAME: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_SIZE: ${CCE_INTELLIGENCE_DB_POOL_SIZE:-10}
      DB_POOL_MIN_IDLE: ${CCE_INTELLIGENCE_DB_POOL_MIN_IDLE:-5}
      # Flyway
      SPRING_FLYWAY_TABLE: flyway_schema_history_intelligence
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "false"
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      # Observability
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_METRICS_TAGS_APPLICATION: cce-intelligence-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - cce-net

  # ==================== Scheduler Service ====================
  cce-scheduler-service:
    image: ${CCE_SCHEDULER_SERVICE_IMAGE:-cce-scheduler-service:latest}
    container_name: cce-scheduler-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - postgres
      - kafka
    ports:
      - "8098:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8083
      # Database
      DB_URL: ${POSTGRES_DB_URL_JDBC:-jdbc:postgresql://cce-postgres:5432/ccedb}
      DB_USERNAME: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC_SCHEDULER_TRIGGERS: ${KAFKA_TOPIC_SCHEDULER_TRIGGERS:-cce.scheduler.triggers}
      # Scheduler config
      SCHEDULER_SCAN_INTERVAL: ${SCHEDULER_SCAN_INTERVAL:-5000}
      SCHEDULER_BATCH_SIZE: ${SCHEDULER_BATCH_SIZE:-100}
      SCHEDULER_LEASE_DURATION: ${SCHEDULER_LEASE_DURATION:-30}
      SCHEDULER_LEADER_RETRY: ${SCHEDULER_LEADER_RETRY:-5000}
      SCHEDULER_LOCK_KEY: ${SCHEDULER_LOCK_KEY:-100001}
      SCHEDULER_TOTAL_PARTITIONS: ${SCHEDULER_TOTAL_PARTITIONS:-1}
      SCHEDULER_LOCK_ACQUIRE_DELAY: ${SCHEDULER_LOCK_ACQUIRE_DELAY:-50}
      # Flyway
      SPRING_FLYWAY_TABLE: flyway_schema_history_scheduler
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "0"
      # Observability
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_METRICS_TAGS_APPLICATION: cce-scheduler-service
      # JVM memory tuning (Paketo buildpack)
      BPL_JVM_THREAD_COUNT: 50
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - cce-net

  gateway:
    image: openmrs/openmrs-reference-application-3-gateway:3.6.0
    restart: "unless-stopped"
    depends_on:
      - frontend
      - backend
    ports:
      - "8096:80"
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'
    networks:
      - cce-net

  frontend:
    image: openmrs/openmrs-reference-application-3-frontend:3.6.0
    restart: "unless-stopped"
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/config-core_demo.json
      SPA_DEFAULT_LOCALE:
    volumes:
      # EC2: /opt/openmrs/config-core_demo.json on the host
      # Local: symlink or copy your local frontend/config-core_demo.json to this path,
      #        or temporarily change back to ./frontend/config-core_demo.json for dev.
      - /opt/openmrs/config-core_demo.json:/usr/share/nginx/html/config-core_demo.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      timeout: 5s
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    networks:
      - cce-net

  backend:
    image: openmrs/openmrs-reference-application-3-backend:3.6.0
    restart: "unless-stopped"
    depends_on:
      - db
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "true"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: ${OMRS_DB_USER:-openmrs}
      OMRS_CONFIG_CONNECTION_PASSWORD: ${OMRS_DB_PASSWORD:-openmrs}
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1536m -XX:+UseG1GC -XX:MaxMetaspaceSize=256m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs"]
      timeout: 5s
    volumes:
      - openmrs-data:/openmrs/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.00'
    networks:
      - cce-net

  # MariaDB
  db:
    image: mariadb:10.11.7
    restart: "unless-stopped"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci"
    healthcheck:
      test: "mysql --user=${OMRS_DB_USER:-openmrs} --password=${OMRS_DB_PASSWORD:-openmrs} --execute \"SHOW DATABASES;\""
      interval: 3s
      timeout: 1s
      retries: 5
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: ${OMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${OMRS_DB_PASSWORD:-openmrs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-openmrs}
    volumes:
      - db-data:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'
    networks:
      - cce-net

  openmrs-cce-receiver-adaptor:
    image: ${CCE_OPENMRS_RECEIVER_ADAPTOR_IMAGE:-openmrs-cce-receiver-adaptor:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openmrs-cce-receiver-adaptor
    ports:
      - "8097:8080"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      OPENMRS_REST_BASE_URL: ${OPENMRS_REST_BASE_URL:-http://gateway:80/openmrs/ws/rest/v1}
      OPENMRS_FHIR_BASE_URL: ${OPENMRS_FHIR_BASE_URL:-http://gateway:80/openmrs/ws/fhir2/R4}
      OPENMRS_REST_TIMEOUT: "30000"
      OPENMRS_FHIR_TIMEOUT: "30000"
      OPENMRS_AUTH_TYPE: basic
      OPENMRS_USERNAME: ${OPENMRS_USERNAME:-admin}
      OPENMRS_PASSWORD: ${OPENMRS_PASSWORD:-Admin123}
      OPENMRS_IDENTIFIER_LOCATION_UUID: ""
      OPENMRS_IDGEN_SOURCE_UUID: ""
      OPENMRS_IDENTIFIER_TYPE_NAME: "OpenMRS ID"
      OPENMRS_CAPABILITY_REFRESH_MS: "21600000"
      CCE_SECURITY_ENABLED: "false"
      CCE_SECURITY_TOKEN: ""
      LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms256m -Xmx512m"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cce-net

  # ==================== Insights Service ====================
  cce-insights-service:
    image: ${CCE_INSIGHTS_SERVICE_IMAGE:-cce-insights-service:latest}
    container_name: cce-insights-service
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - postgres
    ports:
      - "9080:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8084
      DB_HOST: ${POSTGRES_DB_HOST:-cce-postgres}
      DB_PORT: ${POSTGRES_DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-ccedb}
      DB_USERNAME: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POOL_SIZE: ${INSIGHTS_DB_POOL_SIZE:-10}
      CACHE_TTL_LOOKUPS: ${CACHE_TTL_LOOKUPS:-60}
      CACHE_TTL_ANALYTICS: ${CACHE_TTL_ANALYTICS:-30}
      CACHE_TTL_METRICS: ${CACHE_TTL_METRICS:-15}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_METRICS_TAGS_APPLICATION: cce-insights-service
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - cce-net

  # ==================== Insights UI ====================
  cce-insights-ui:
    image: ${CCE_INSIGHTS_UI_IMAGE:-cce-insights-ui:latest}
    container_name: cce-insights-ui
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - cce-net


networks:
  cce-net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  mongo-data:
  prometheus-data:
  grafana-data:
  openmrs-data:
    external: true
    name: o3_openmrs-data
  db-data:
    external: true
    name: o3_db-data

