name: Deploy CCE Services

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select the environment to deploy"
        required: true
        type: choice
        options:
          - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET_ENV: ${{ github.event.inputs.target_env }}

    steps:
      - name: Confirm environment input
        run: echo "Deploying to $TARGET_ENV"
        shell: bash

      - uses: actions/checkout@v6

      - name: Sync files to Dev Host
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -av --exclude='.git' --exclude='.github' --exclude='.gitignore'
          path: ./
          remote_path: ${{ vars.DEV_REMOTE_PROJECT_PATH }}
          remote_host: ${{ secrets.DEV_HOST }}
          remote_user: ${{ secrets.DEV_USER }}
          remote_key: ${{ secrets.DEV_SSH_KEY }}

      - name: Deploy to dev
        if: env.TARGET_ENV == 'dev'
        uses: appleboy/ssh-action@v1.2.2
      
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            set -Eeuo pipefail
            REMOTE_PROJECT_PATH="${{ vars.DEV_REMOTE_PROJECT_PATH }}"
            AWS_ACCOUNT_ID="${{ vars.AWS_ACCOUNT_ID }}"
            AWS_REGION="${{ vars.AWS_REGION }}"
            ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            if [ -z "${REMOTE_PROJECT_PATH}" ]; then
              echo "Set the DEV_REMOTE_PROJECT_PATH repository variable to the project directory on the dev host."
              exit 1
            fi
            cd "${REMOTE_PROJECT_PATH}"
            COMPOSE_FILE="${REMOTE_PROJECT_PATH}/docker-compose.yml"
            # ECR login required for private images. Dev host must have AWS CLI and credentials with ecr:GetAuthorizationToken + ecr:BatchGetImage (e.g. IAM instance role).
            if command -v aws >/dev/null 2>&1; then
              aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            else
              echo "Error: aws CLI not found on dev host. Install AWS CLI and configure credentials with ECR pull access."
              exit 1
            fi
            docker compose -f "${COMPOSE_FILE}" pull
            docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans
