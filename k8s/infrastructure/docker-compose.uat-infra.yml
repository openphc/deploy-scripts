# UAT Infrastructure — PostgreSQL & Kafka (Docker containers)
# Run on the VM alongside k3s. Services in cce-uat namespace connect to these.
#
# Usage:
#   docker compose -f docker-compose.uat-infra.yml up -d
#   docker compose -f docker-compose.uat-infra.yml down
#   docker compose -f docker-compose.uat-infra.yml down -v  # wipe data

version: "3.9"

services:
  postgres-uat:
    image: postgres:16
    container_name: postgres-uat
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_UAT_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_UAT_PASSWORD:?set POSTGRES_UAT_PASSWORD in the environment / .env}
      POSTGRES_DB: ${POSTGRES_UAT_DB:-ccedb}
    volumes:
      - postgres_uat_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_UAT_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  kafka-uat:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-uat
    restart: unless-stopped
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${VM_HOST_IP:-localhost}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_uat_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 | grep ApiVersion || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cce-uat
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-uat:9092
      KAFKA_CLUSTERS_1_NAME: cce-prod
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: host.docker.internal:9092
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka-uat:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  postgres_uat_data:
  kafka_uat_data:
