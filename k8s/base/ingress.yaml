apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cce-ingress
  annotations:
    # Serve on HTTPS (:websecure). HTTP(:web) is redirected to HTTPS globally by Traefik
    # (see base/traefik/traefik-helmchartconfig.yaml).
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # ACME resolver that issues + auto-renews the cert. Use "lestaging" for testing, "le" for real.
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  rules:
    - http:
        paths:
          - path: /insights
            pathType: Prefix
            backend:
              service:
                name: cce-insights-ui
                port:
                  number: 3001
          - path: /assets
            pathType: Prefix
            backend:
              service:
                name: cce-insights-ui
                port:
                  number: 3001
          - path: /v1/insights
            pathType: Prefix
            backend:
              service:
                name: cce-insights-service
                port:
                  number: 8084
          - path: /api/insights
            pathType: Prefix
            backend:
              service:
                name: cce-insights-service
                port:
                  number: 8084
          - path: /api/collector
            pathType: Prefix
            backend:
              service:
                name: cce-collector-service
                port:
                  number: 8080
          - path: /v1/compliance
            pathType: Prefix
            backend:
              service:
                name: cce-compliance-service
                port:
                  number: 8080
          - path: /inbound
            pathType: Prefix
            backend:
              service:
                name: cce-emitter-adaptor
                port:
                  number: 8082
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /kafka-ui
            pathType: Prefix
            backend:
              service:
                name: kafka-ui
                port:
                  number: 8080
