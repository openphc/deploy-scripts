apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:v0.7.2
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: KAFKA_UI_CLUSTER_NAME
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            # Cap the JVM heap under the container limit so kafka-ui (Java 17 / Spring Boot) doesn't
            # OOMKill (it was crash-looping at 512Mi — exit 137). Heap ~60% of 1Gi leaves room for non-heap.
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=60.0"
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
