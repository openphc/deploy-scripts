apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  # Single replica on a RWO PVC: Recreate (not RollingUpdate) so the old pod releases the
  # TSDB lock before the new one starts (otherwise the new pod crash-loops on the DB lock).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-config
              mountPath: /etc/prometheus/alert-rules.yml
              subPath: alert-rules.yml
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: "1"
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert-rules.yml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "cce-collector-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cce-collector-service:8080"]

      - job_name: "cce-emitter-adaptor"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cce-emitter-adaptor:8082"]

      - job_name: "cce-compliance-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cce-compliance-service:8080"]

      - job_name: "cce-scheduler-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cce-scheduler-service:8083"]

      - job_name: "cce-insights-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cce-insights-service:8084"]

      - job_name: "cce-intelligence-service"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cce-intelligence-service:8085"]

      - job_name: "node-exporter"
        static_configs:
          - targets: ["node-exporter:9100"]

      # ClickHouse (data-pipeline) metrics. On RW UAT the pipeline runs as docker containers,
      # so the metrics port is published on the docker bridge gateway (172.18.0.1:9363).
      # For PROD (ClickHouse installed natively on the host) change this to the host IP:9363.
      - job_name: "clickhouse"
        static_configs:
          - targets: ["172.18.0.1:9363"]

  alert-rules.yml: |
    groups:
      - name: cce-alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
          - alert: HighMemoryUsage
            expr: process_resident_memory_bytes / 1024 / 1024 > 800
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on {{ $labels.job }}"
