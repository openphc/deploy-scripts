apiVersion: apps/v1
kind: Deployment
metadata:
  name: cce-compliance-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cce-compliance-service
  template:
    metadata:
      labels:
        app: cce-compliance-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: cce-compliance-service
          image: ghcr.io/openphc/cce-compliance-service:release-1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            # Paketo caps -XX:MaxDirectMemorySize at 10m by default; the Kafka consumer needs
            # bigger direct buffers to fetch a large backlog (e.g. a replay) — raise to 512m.
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxDirectMemorySize=512m"
            - name: SERVER_PORT
              value: "8080"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_DB
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_PASSWORD
            - name: DB_POOL_SIZE
              value: "30"
            - name: DB_POOL_MIN_IDLE
              value: "10"
            - name: DB_CONNECTION_TIMEOUT
              value: "30000"
            - name: DB_IDLE_TIMEOUT
              value: "600000"
            - name: DB_MAX_LIFETIME
              value: "1800000"
            - name: SPRING_FLYWAY_ENABLED
              value: "false"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_CONCURRENCY
              value: "5"
            - name: KAFKA_PARTITIONS
              value: "25"
            - name: KAFKA_RETRY_MAX_ATTEMPTS
              value: "5"
            - name: KAFKA_RETRY_BACKOFF_MS
              value: "2000"
            - name: TRACING_SAMPLE_RATE
              value: "0.1"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics"
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION
              value: "cce-compliance-service"
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1536Mi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cce-compliance-service
spec:
  selector:
    app: cce-compliance-service
  ports:
    - port: 8080
      targetPort: 8080
