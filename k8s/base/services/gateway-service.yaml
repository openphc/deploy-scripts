apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8090"
    spec:
      containers:
        - name: gateway-service
          image: ghcr.io/openphc/gateway-service:release-1.0.0
          ports:
            - containerPort: 8090
          env:
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
            - name: SERVER_PORT
              value: "8090"
            # ---- Database (R2DBC) ----
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "r2dbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_PASSWORD
            # ---- CORS ----
            # Must NOT be "*" — the gateway sets allowCredentials=true, and Spring rejects
            # the wildcard with credentials (every request 500s otherwise). Set a concrete
            # origin per environment via cce-config.
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: ALLOWED_ORIGINS
            # ---- JWT (must match the Keycloak realm that issues tokens) ----
            - name: JWT_ISSUER
              value: "http://keycloak:8080/auth/realms/cce"
            - name: JWT_AUDIENCE
              value: "gateway-service"
            - name: JWT_ROLES_CLAIM_PATH
              value: "resource_access.gateway-service.roles"
            # ---- Downstream routes (in-cluster service names) ----
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_ID
              value: "cce-collector-service"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI
              value: "http://cce-collector-service:8080"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_PREDICATES_0
              value: "Path=/v1/events/**"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_FILTERS_0_NAME
              value: "JwtValidationFilter"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_ID
              value: "cce-compliance-service"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI
              value: "http://cce-compliance-service:8080"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_PREDICATES_0
              value: "Path=/v1/compliance/**"
            # ---- Keycloak (in-cluster) ----
            - name: KEYCLOAK_SERVER_URL
              value: "http://keycloak:8080/auth"
            - name: KEYCLOAK_REALM
              value: "cce"
            - name: KEYCLOAK_TARGET_REALM
              value: "cce"
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: "admin-cli"
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            # ---- Authorization ----
            - name: AUTHORIZATION_ENABLED
              value: "true"
            - name: LOAD_PERMISSIONS_FROM_DATABASE_ON_STARTUP
              value: "true"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics"
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION
              value: "gateway-service"
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8090
      targetPort: 8090
