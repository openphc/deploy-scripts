apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8090"
    spec:
      containers:
        - name: gateway-service
          image: ghcr.io/openphc/gateway-service:release-1.0.0
          ports:
            - containerPort: 8090
          env:
            - name: JAVA_OPTS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
            - name: SERVER_PORT
              value: "8090"
            # ---- Database (R2DBC) ----
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "r2dbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_PASSWORD
            # ---- CORS ----
            # Must NOT be "*" — the gateway sets allowCredentials=true, and Spring rejects
            # the wildcard with credentials (every request 500s otherwise). Set a concrete
            # origin per environment via cce-config.
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: ALLOWED_ORIGINS
            # ---- JWT (must match the issuer in tokens) ----
            # External clients obtain tokens from the PUBLIC Keycloak URL, so the iss claim is
            # the public issuer. Set per-environment in cce-config (KEYCLOAK_ISSUER); the gateway
            # also fetches JWKS from this URL (resolved in-cluster via a hostAlias -> Traefik).
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: KEYCLOAK_ISSUER
            - name: JWT_AUDIENCE
              value: "gateway-service"
            - name: JWT_ROLES_CLAIM_PATH
              value: "resource_access.gateway-service.roles"
            # ---- Basic Auth (OpenHIM -> gateway) ----
            # OpenHIM channel routes can only send Basic auth; the gateway exchanges those creds
            # for a Keycloak token (resource-owner-password grant) via the confidential
            # 'openhim-basic' client, then applies the normal JWT + DB authorization.
            - name: BASIC_AUTH_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: BASIC_AUTH_ENABLED
            - name: BASIC_AUTH_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: BASIC_AUTH_CLIENT_ID
            - name: BASIC_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: BASIC_AUTH_CLIENT_SECRET
                  # optional so the gateway still starts in an env where this key isn't set yet
                  # (e.g. before that env's openhim-basic client exists); Basic auth is inert until set.
                  optional: true
            # Token endpoint on the SAME realm as JWT_ISSUER so the minted token's iss matches.
            - name: BASIC_AUTH_TOKEN_URI
              value: "$(JWT_ISSUER)/protocol/openid-connect/token"
            # ---- Downstream routes (in-cluster service names) ----
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_ID
              value: "cce-collector-service"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_URI
              value: "http://cce-collector-service:8080"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_PREDICATES_0
              value: "Path=/v1/events/**"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_0_FILTERS_0_NAME
              value: "JwtValidationFilter"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_ID
              value: "cce-compliance-service"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_URI
              value: "http://cce-compliance-service:8080"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_PREDICATES_0
              value: "Path=/v1/compliance/**"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_1_FILTERS_0_NAME
              value: "JwtValidationFilter"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_ID
              value: "cce-insights-service"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_URI
              value: "http://cce-insights-service:8084"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_PREDICATES_0
              value: "Path=/v1/insights/**"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_2_FILTERS_0_NAME
              value: "JwtValidationFilter"
            # openhim-emitter-adaptor inbound behind the gateway. StripPrefix=2 rewrites
            # /v1/openhim-emitter-adaptor/inbound -> /inbound on the adaptor (which serves /inbound).
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_ID
              value: "openhim-emitter-adaptor"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_URI
              value: "http://openhim-emitter-adaptor:8082"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_PREDICATES_0
              value: "Path=/v1/openhim-emitter-adaptor/**"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_FILTERS_0_NAME
              value: "JwtValidationFilter"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_FILTERS_1_NAME
              value: "StripPrefix"
            - name: SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_ROUTES_3_FILTERS_1_ARGS_PARTS
              value: "2"
            # ---- Keycloak (in-cluster) ----
            - name: KEYCLOAK_SERVER_URL
              value: "http://keycloak:8080/auth"
            - name: KEYCLOAK_REALM
              value: "cce"
            - name: KEYCLOAK_TARGET_REALM
              value: "cce"
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: "admin-cli"
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            # ---- Authorization ----
            - name: AUTHORIZATION_ENABLED
              value: "true"
            - name: LOAD_PERMISSIONS_FROM_DATABASE_ON_STARTUP
              value: "true"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics"
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION
              value: "gateway-service"
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8090
      targetPort: 8090
