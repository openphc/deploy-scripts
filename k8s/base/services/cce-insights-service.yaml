apiVersion: apps/v1
kind: Deployment
metadata:
  name: cce-insights-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cce-insights-service
  template:
    metadata:
      labels:
        app: cce-insights-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8084"
    spec:
      containers:
        - name: cce-insights-service
          image: ghcr.io/openphc/cce-insights-service:demo
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVER_PORT
              value: "8084"
            # insights-service's datasource is ClickHouse (jdbc:clickhouse://${DB_HOST}:${DB_PORT}/${DB_NAME}),
            # NOT Postgres — so DB_* must point at ClickHouse, not the cce-config Postgres values.
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: CLICKHOUSE_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: CLICKHOUSE_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: CLICKHOUSE_DB
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: CLICKHOUSE_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: CLICKHOUSE_PASSWORD
            # Feeds application.yml placeholder ${CLICKHOUSE_USE_FINAL} -> cce.clickhouse.use-final.
            # When "true", MV reads append FINAL so ReplacingMergeTree intraday refresh snapshots are
            # de-duplicated at query time (fixes adoption "actual visits" double-counting). From cce-config.
            - name: CLICKHOUSE_USE_FINAL
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: CLICKHOUSE_USE_FINAL
            - name: DB_POOL_SIZE
              value: "10"
            # Caffeine cache TTLs (CacheConfig.java applies these as TimeUnit.SECONDS -- despite
            # application.yml's "(minutes)" comment/these keys' historical minutes-style values,
            # e.g. 60/30/15). From cce-config so they're adjustable without a redeploy-from-scratch.
            - name: CACHE_TTL_LOOKUPS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: CACHE_TTL_LOOKUPS
            - name: CACHE_TTL_ANALYTICS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: CACHE_TTL_ANALYTICS
            - name: CACHE_TTL_METRICS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: CACHE_TTL_METRICS
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics"
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION
              value: "cce-insights-service"
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cce-insights-service
spec:
  selector:
    app: cce-insights-service
  ports:
    - port: 8084
      targetPort: 8084
