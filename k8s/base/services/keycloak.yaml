apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.4
          args:
            - start
            - --http-relative-path=/auth
            - --proxy-headers=xforwarded
            - --hostname-strict=false
          ports:
            - containerPort: 8080
          env:
            - name: KC_DB
              value: "postgres"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: POSTGRES_PORT
            - name: KC_DB_URL
              value: "jdbc:postgresql://$(DB_HOST):$(DB_PORT)/keycloak"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: POSTGRES_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: KEYCLOAK_ADMIN_USER
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: "1"
          # Keycloak 26.x serves health on the MANAGEMENT port (9000), and --http-relative-path=/auth
          # applies there too -> /auth/health/*. It also runs a build + (on upgrade) a DB migration
          # on `start` (minutes), so a startupProbe keeps the liveness probe from killing it early.
          startupProbe:
            httpGet:
              path: /auth/health/started
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: 9000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: 9000
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
