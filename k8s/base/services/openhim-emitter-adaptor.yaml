apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhim-emitter-adaptor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openhim-emitter-adaptor
  template:
    metadata:
      labels:
        app: openhim-emitter-adaptor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: openhim-emitter-adaptor
          image: ghcr.io/openphc/openhim-cce-emitter-adaptor:release-1.0.0
          ports:
            - containerPort: 8082
          env:
            - name: OPENHIM_CORE_HOST
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: OPENHIM_CORE_HOST
            - name: OPENHIM_CORE_API_PORT
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: OPENHIM_CORE_API_PORT      
            - name: FACILITY_FILTER_IDS
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: FACILITY_FILTER_IDS
            - name: OPENHIM_CORE_SCHEME
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: OPENHIM_CORE_SCHEME
            - name: OPENHIM_CORE_AUTH_TYPE
              valueFrom:
                configMapKeyRef:
                  name: cce-config
                  key: OPENHIM_CORE_AUTH_TYPE
            - name: OPENHIM_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: OPENHIM_USERNAME
            - name: OPENHIM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: OPENHIM_PASSWORD
            - name: CCE_COLLECTOR_URL
              value: "http://cce-collector-service:8080"
            - name: CCE_COLLECTOR_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cce-secrets
                  key: CCE_COLLECTOR_AUTH_TOKEN
            - name: EBUZIMA_CLIENT_ID
              value: "ebuzima"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus,metrics"
            - name: MANAGEMENT_METRICS_TAGS_APPLICATION
              value: "openhim-emitter-adaptor"
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
              cpu: 500m
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: openhim-emitter-adaptor
spec:
  selector:
    app: openhim-emitter-adaptor
  ports:
    - port: 8082
      targetPort: 8082
