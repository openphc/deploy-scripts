apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Infrastructure (Kafka UI only — Postgres & Kafka run on host)
  - infrastructure/kafka-ui.yaml
  # Application Services
  - services/openhim-emitter-adaptor.yaml
  - services/cce-collector-service.yaml
  - services/cce-compliance-service.yaml
  - services/cce-intelligence-service.yaml
  - services/cce-scheduler-service.yaml
  - services/cce-insights-service.yaml
  - services/cce-insights-ui.yaml
  # API Gateway
  - services/gateway-service.yaml
  # Identity & Access Management
  - services/keycloak.yaml
  # Monitoring
  - monitoring/prometheus.yaml
  - monitoring/grafana.yaml
  - monitoring/node-exporter.yaml
  # Networking
  - network-policy.yaml
  - ingress.yaml
