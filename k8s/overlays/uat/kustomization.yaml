apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cce-uat

resources:
  - ../../base
  - namespace.yaml

configMapGenerator:
  - name: cce-config
    literals:
      - POSTGRES_DB=ccedb
      - POSTGRES_HOST=${VM_HOST_IP}
      - POSTGRES_PORT=5433
      - KAFKA_BOOTSTRAP_SERVERS=${VM_HOST_IP}:9093
      - KAFKA_UI_CLUSTER_NAME=cce-uat
      - OPENHIM_CORE_HOST=197.243.24.138
      - KEYCLOAK_HOST=http://keycloak:8080/auth

secretGenerator:
  - name: cce-secrets
    literals:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=cceuat@2024
      - CCE_COLLECTOR_AUTH_TOKEN=cce-uat-token-2024
      - GRAFANA_ADMIN_USER=admin
      - GRAFANA_ADMIN_PASSWORD=grafana@uat2024
      - KEYCLOAK_ADMIN_USER=admin
      - KEYCLOAK_ADMIN_PASSWORD=keycloak@uat2024
      - OPENHIM_USERNAME=
      - OPENHIM_PASSWORD=
      - KEYCLOAK_CLIENT_ID=
      - KEYCLOAK_CLIENT_SECRET=

generatorOptions:
  disableNameSuffixHash: true

# UAT-specific patches — imagePullPolicy: Never (images pre-loaded into containerd)
patches:
  - target:
      kind: Ingress
      name: cce-ingress
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: ${INGRESS_HOST}
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - ${INGRESS_HOST}
  - target:
      kind: Deployment
      name: cce-collector-service
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: cce-compliance-service
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: cce-emitter-adaptor
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: cce-insights-service
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: cce-insights-ui
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      kind: Deployment
      name: cce-scheduler-service
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never

images:
  - name: ghcr.io/openphc/cce-collector-service
    newName: ghcr.io/openphc/cce-collector-service:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-compliance-service
    newName: ghcr.io/openphc/cce-compliance-service:latest
    newTag: latest
  - name: ghcr.io/openphc/openhim-cce-emitter-adaptor
    newName: ghcr.io/openphc/openhim-cce-emitter-adaptor:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-insights-service
    newName: ghcr.io/openphc/cce-insights-service:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-insights-ui
    newName: ghcr.io/openphc/cce-insights-ui:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-scheduler-service
    newName: ghcr.io/openphc/cce-scheduler-service:latest
    newTag: latest

commonLabels:
  environment: uat
