apiVersion: v1
kind: Namespace
metadata:
  name: cce-prod
  labels:
    environment: prod
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-resource-quota
  namespace: cce-prod
spec:
  # Sized for the vertically-scaled services (compliance 6x; insights-ui/scheduler 4x; rest 3x),
  # with headroom for rolling-update surge (old+new pod briefly co-exist). Still bounded so
  # cce-prod cannot starve the shared node (UAT + native infra).
  hard:
    requests.cpu: "12"
    requests.memory: 16Gi
    limits.cpu: "40"
    limits.memory: 64Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limit-range
  namespace: cce-prod
spec:
  limits:
    - default:
        memory: 1Gi
        cpu: "1"
      defaultRequest:
        memory: 256Mi
        cpu: 200m
      type: Container
