apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cce-prod

resources:
  - ../../base
  - namespace.yaml
  - scheduler-hpa.yaml
  - cce-hpas.yaml
  - ratelimit.yaml

configMapGenerator:
  - name: cce-config
    literals:
      - POSTGRES_DB=ccedb
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=5432
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_UI_CLUSTER_NAME=cce-prod
      - OPENHIM_CORE_HOST=${OPENHIM_CORE_HOST}
      - OPENHIM_CORE_API_PORT=${OPENHIM_CORE_API_PORT}
      - OPENHIM_CORE_SCHEME=${OPENHIM_CORE_SCHEME}
      - OPENHIM_CORE_AUTH_TYPE=${OPENHIM_CORE_AUTH_TYPE}
      - FACILITY_FILTER_IDS=${FACILITY_FILTER_IDS}
      - KEYCLOAK_HOST=http://keycloak:8080/auth
      # Public token issuer (gateway validates iss against this). Built from INGRESS_HOST.
      - KEYCLOAK_ISSUER=https://${INGRESS_HOST}/auth/realms/cce
      # Grafana served under /grafana by the ingress (root_url + serve_from_sub_path).
      - GRAFANA_ROOT_URL=https://${INGRESS_HOST}/grafana
      # ClickHouse (data-pipeline) — insights-service's datasource. In PROD the pipeline
      # runs natively on the host, so this is the host IP reachable from k3s pods.
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
      # PROD ClickHouse is installed natively on the host with shifted ports (UAT's docker
      # ClickHouse already holds 8123/9009/9363 on this shared VM): HTTP 8124, metrics 9364.
      - CLICKHOUSE_PORT=8124
      - CLICKHOUSE_DB=cce_analytics
      # insights-service cce.clickhouse.use-final -- "true" appends FINAL to MV reads so
      # ReplacingMergeTree intraday snapshots are de-duplicated at query time. Set in Infisical.
      - CLICKHOUSE_USE_FINAL=${CLICKHOUSE_USE_FINAL}
      # insights-service Caffeine cache TTLs (seconds -- CacheConfig.java uses TimeUnit.SECONDS
      # despite these keys' historical minutes-style naming/values). Set in Infisical.
      - CACHE_TTL_LOOKUPS=${CACHE_TTL_LOOKUPS}
      - CACHE_TTL_ANALYTICS=${CACHE_TTL_ANALYTICS}
      - CACHE_TTL_METRICS=${CACHE_TTL_METRICS}
      # gateway-service CORS allowed origin. Concrete origin only, never "*".
      - ALLOWED_ORIGINS=${GATEWAY_ALLOWED_ORIGINS}
      - BASIC_AUTH_ENABLED=${BASIC_AUTH_ENABLED}
      - BASIC_AUTH_CLIENT_ID=${BASIC_AUTH_CLIENT_ID}

secretGenerator:
  - name: cce-secrets
    # All values are injected from the gitignored .env.prod / Infisical at deploy time
    # (envsubst) — never hard-code credentials here.
    literals:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CCE_COLLECTOR_AUTH_TOKEN=${CCE_COLLECTOR_AUTH_TOKEN}
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - KEYCLOAK_ADMIN_USER=${KEYCLOAK_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - OPENHIM_USERNAME=${OPENHIM_USERNAME}
      - OPENHIM_PASSWORD=${OPENHIM_PASSWORD}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - BASIC_AUTH_CLIENT_SECRET=${BASIC_AUTH_CLIENT_SECRET}

generatorOptions:
  disableNameSuffixHash: true

# PROD patches — pull :latest from GHCR + host-based TLS routing + higher resources.
patches:
  - target:
      kind: Ingress
      name: cce-ingress
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: ${INGRESS_HOST}
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - ${INGRESS_HOST}
  # Rate-limit ingresses (ratelimit.yaml) — inject the host + TLS like the main ingress.
  - target: { kind: Ingress, name: cce-ingress-rl-compliance }
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: ${INGRESS_HOST}
      - op: add
        path: /spec/tls
        value:
          - hosts: [ "${INGRESS_HOST}" ]
  - target: { kind: Ingress, name: cce-ingress-rl-insights }
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: ${INGRESS_HOST}
      - op: add
        path: /spec/tls
        value:
          - hosts: [ "${INGRESS_HOST}" ]
  - target: { kind: Ingress, name: cce-ingress-rl-events }
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: ${INGRESS_HOST}
      - op: add
        path: /spec/tls
        value:
          - hosts: [ "${INGRESS_HOST}" ]
  # Vertical scaling (2026-06-18): compliance 6x; insights-ui + scheduler 4x; rest 3x — over the
  # base requests/limits. Requires the raised ResourceQuota in namespace.yaml. imagePullPolicy is
  # input-driven (${IMAGE_PULL_POLICY}, from Infisical /platform, default "Always") on every CCE
  # service rather than hardcoded — 2026-07-22: lets an operator pin to IfNotPresent (e.g. to force
  # a redeploy onto an exact prior digest without risking an unwanted mutable-tag pull mid-incident).
  # NOTE: cce-scheduler-service is leader-elected — see strategy note below.
  - target:
      kind: Deployment
      name: cce-collector-service
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/imagePullPolicy, value: ${IMAGE_PULL_POLICY}}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/cpu, value: "600m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/memory, value: "758Mi"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/cpu, value: "3"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/memory, value: "2304Mi"}
  - target:
      kind: Deployment
      name: cce-compliance-service
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/imagePullPolicy, value: ${IMAGE_PULL_POLICY}}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/cpu, value: "600m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/memory, value: "758Mi"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/cpu, value: "1200m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/memory, value: "1536Mi"}
  - target:
      kind: Deployment
      name: cce-intelligence-service
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/imagePullPolicy, value: ${IMAGE_PULL_POLICY}}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/cpu, value: "600m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/memory, value: "768Mi"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/cpu, value: "3"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/memory, value: "3Gi"}
  - target:
      kind: Deployment
      name: gateway-service
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/imagePullPolicy, value: ${IMAGE_PULL_POLICY}}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/cpu, value: "600m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/memory, value: "768Mi"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/cpu, value: "3"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/memory, value: "1536Mi"}
  # Scheduler: greedy partitioned leader-election (HA). 3 replicas (managed by scheduler-hpa.yaml)
  # = 1 active leader (owns the partitions) + hot standbys that take over on failure.
  # SCHEDULER_TOTAL_PARTITIONS=3 parallelizes work within the active leader. CRITICAL: probes MUST
  # use the dedicated liveness/readiness endpoints — the aggregate /actuator/health returns 503 on
  # a standby (leadership indicator DOWN), which would liveness-kill standbys into a crashloop.
  # maxSurge=0/maxUnavailable=1 avoids a partition-less surge pod. Strategic-merge (merges env by name).
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cce-scheduler-service
      spec:
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
        template:
          spec:
            containers:
              - name: cce-scheduler-service
                imagePullPolicy: ${IMAGE_PULL_POLICY}
                env:
                  - name: SCHEDULER_TOTAL_PARTITIONS
                    value: "3"
                livenessProbe:
                  httpGet:
                    path: /actuator/health/liveness
                readinessProbe:
                  httpGet:
                    path: /actuator/health/readiness
                resources:
                  requests:
                    cpu: 400m
                    memory: 1Gi
                  limits:
                    cpu: "2"
                    memory: 3Gi
  - target:
      kind: Deployment
      name: openhim-emitter-adaptor
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/imagePullPolicy, value: ${IMAGE_PULL_POLICY}}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/cpu, value: "300m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/memory, value: "768Mi"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/cpu, value: "1500m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/memory, value: "2304Mi"}
  - target:
      kind: Deployment
      name: cce-insights-service
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/imagePullPolicy, value: ${IMAGE_PULL_POLICY}}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/cpu, value: "600m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/memory, value: "768Mi"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/cpu, value: "3"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/memory, value: "3Gi"}
  - target:
      kind: Deployment
      name: cce-insights-ui
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/imagePullPolicy, value: ${IMAGE_PULL_POLICY}}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/cpu, value: "200m"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/requests/memory, value: "256Mi"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/cpu, value: "1"}
      - {op: replace, path: /spec/template/spec/containers/0/resources/limits/memory, value: "1Gi"}
  # PROD node-exporter shares the single node with UAT's. Both run hostNetwork:true and would bind
  # host :9100 — so PROD's pod stayed Pending ("didn't have free ports"). Shift PROD to :9101: change
  # the listen-address + containerPort/hostPort (must match under hostNetwork). The Service keeps
  # port 9100 (targetPort 9101) so prometheus's "node-exporter:9100" target is unchanged.
  - target:
      kind: DaemonSet
      name: node-exporter
    patch: |
      - {op: add, path: /spec/template/spec/containers/0/args/-, value: "--web.listen-address=:9101"}
      - {op: replace, path: /spec/template/spec/containers/0/ports/0, value: {containerPort: 9101, hostPort: 9101}}
      - {op: replace, path: /spec/template/metadata/annotations/prometheus.io~1port, value: "9101"}
  - target:
      kind: Service
      name: node-exporter
    patch: |
      - {op: replace, path: /spec/ports/0/targetPort, value: 9101}

images:
  - name: ghcr.io/openphc/cce-collector-service
    newName: ghcr.io/openphc/cce-collector-service
    newTag: latest
  - name: ghcr.io/openphc/cce-compliance-service
    newName: ghcr.io/openphc/cce-compliance-service
    newTag: latest
  - name: ghcr.io/openphc/cce-intelligence-service
    newName: ghcr.io/openphc/cce-intelligence-service
    newTag: latest
  - name: ghcr.io/openphc/gateway-service
    newName: ghcr.io/openphc/gateway-service
    newTag: latest
  - name: ghcr.io/openphc/openhim-cce-emitter-adaptor
    newName: ghcr.io/openphc/openhim-cce-emitter-adaptor
    newTag: latest
  - name: ghcr.io/openphc/cce-insights-service
    newName: ghcr.io/openphc/cce-insights-service
    newTag: demo-rw-latest
  - name: ghcr.io/openphc/cce-insights-ui
    newName: ghcr.io/openphc/cce-insights-ui
    newTag: demo-rw-latest
  - name: ghcr.io/openphc/cce-scheduler-service
    newName: ghcr.io/openphc/cce-scheduler-service
    newTag: latest

commonLabels:
  environment: prod
