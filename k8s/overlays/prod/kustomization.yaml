apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cce-prod

resources:
  - ../../base
  - namespace.yaml

configMapGenerator:
  - name: cce-config
    literals:
      - POSTGRES_DB=ccedb
      - POSTGRES_HOST=${VM_HOST_IP}
      - POSTGRES_PORT=5432
      - KAFKA_BOOTSTRAP_SERVERS=${VM_HOST_IP}:9092
      - KAFKA_UI_CLUSTER_NAME=cce-prod
      - OPENHIM_CORE_HOST=${OPENHIM_CORE_HOST}
      - KEYCLOAK_HOST=

secretGenerator:
  - name: cce-secrets
    # All values are injected from the gitignored .env.prod at deploy time (envsubst) —
    # never hard-code credentials here.
    literals:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CCE_COLLECTOR_AUTH_TOKEN=${CCE_COLLECTOR_AUTH_TOKEN}
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - KEYCLOAK_ADMIN_USER=${KEYCLOAK_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - OPENHIM_USERNAME=${OPENHIM_USERNAME}
      - OPENHIM_PASSWORD=${OPENHIM_PASSWORD}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}

generatorOptions:
  disableNameSuffixHash: true

# PROD-specific patches — host-based routing and higher resources
patches:
  - target:
      kind: Ingress
      name: cce-ingress
    patch: |
      - op: add
        path: /spec/rules/0/host
        value: ${INGRESS_HOST}
      - op: add
        path: /spec/tls
        value:
          - hosts:
              - ${INGRESS_HOST}
  - target:
      kind: Deployment
      name: cce-compliance-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
  - target:
      kind: Deployment
      name: cce-collector-service
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m

images:
  - name: ghcr.io/openphc/cce-collector-service
    newName: ghcr.io/openphc/cce-collector-service:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-compliance-service
    newName: ghcr.io/openphc/cce-compliance-service:latest
    newTag: latest
  - name: ghcr.io/openphc/openhim-cce-emitter-adaptor
    newName: ghcr.io/openphc/openhim-cce-emitter-adaptor:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-insights-service
    newName: ghcr.io/openphc/cce-insights-service:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-insights-ui
    newName: ghcr.io/openphc/cce-insights-ui:latest
    newTag: latest
  - name: ghcr.io/openphc/cce-scheduler-service
    newName: ghcr.io/openphc/cce-scheduler-service:latest
    newTag: latest

commonLabels:
  environment: prod
