global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cce-collector-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["cce-collector-service:8080"]

  - job_name: "openhim-cce-emmitter-adaptor"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["openhim-cce-emmitter-adaptor:8082"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cce-compliance-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["cce-compliance-service:8080"]

  - job_name: "cce-scheduler-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["cce-scheduler-service:8083"]

  - job_name: "cce-intelligence-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["cce-intelligence-service:8085"]

  # Data pipeline — ClickHouse server metrics (analytics store)
  - job_name: "clickhouse"
    metrics_path: /metrics
    static_configs:
      - targets: ["clickhouse:9363"]

  # PostgreSQL via postgres_exporter
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Kafka via kafka_exporter
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  # Caddy reverse proxy (host-networked) — reached via the host gateway
  - job_name: "caddy"
    static_configs:
      - targets: ["host.docker.internal:9180"]
