global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cce-collector-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["cce-collector-service:8080"]

  - job_name: "openhim-cce-emmitter-adaptor"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["openhim-cce-emmitter-adaptor:8082"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
